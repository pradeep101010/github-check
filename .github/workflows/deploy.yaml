# .github/workflows/deploy.yml
name: Deploy Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -t package/  # install deps into a folder called package
          cp -r src/* package/                         # copy your lambda code into same folder

      - name: Zip everything
        run: |
          cd package
          zip -r ../deployment.zip .                   # zip the whole package folder

      - name: Deploy to Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-2
        run: |
           aws lambda update-function-code \
            --function-name github-deployed-function-test \
            --zip-file fileb://deployment.zip

            aws lambda wait function-updated \
            --function-name github-deployed-function-test

            aws lambda update-function-configuration \
            --function-name github-deployed-function-test \
            --handler main.main \
            --timeout 900 \
            --memory-size 1024

